<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="container">

  <!-- TOP -->
  <div class="top">
    <h2>Welcome 👋</h2>
    <div id="userAvatar" class="avatar">U</div>
  </div>

  <!-- BALANCE -->
  <div class="card">
    <p>Available Balance</p>
    <div id="balanceAmount" class="balance">₵ 0.00</div>
    <p id="accountNumber">N/A</p>

    <div class="buttons">
      <button onclick="openModal('deposit')">💰 Deposit</button>
      <button onclick="openModal('transfer')">💸 Send</button>
      <button onclick="openModal('withdraw')">🏧 Withdraw</button>
    </div>
  </div>

  <!-- TRANSACTIONS -->
  <div class="section">
    <h3>Recent Transactions</h3>
    <div id="transactionsList"></div>
  </div>

  <!-- LOGOUT -->
  <div class="section">
    <button onclick="logout()">Logout</button>
  </div>

</div>

<!-- ================= MODALS ================= -->

<!-- DEPOSIT -->
<div id="depositModal" class="modal">
  <div class="modal-content">
    <h3>Deposit</h3>
    <form id="depositForm">
      <input type="number" placeholder="Amount" required />
      <button type="submit">Deposit</button>
    </form>
    <button onclick="closeModal('deposit')">Close</button>
  </div>
</div>

<!-- TRANSFER -->
<div id="transferModal" class="modal">
  <div class="modal-content">
    <h3>Send Money</h3>
    <form id="transferForm">
      <input type="text" placeholder="Receiver Account" required />
      <input type="number" placeholder="Amount" required />
      <button type="submit">Send</button>
    </form>
    <button onclick="closeModal('transfer')">Close</button>
  </div>
</div>

<!-- WITHDRAW -->
<div id="withdrawModal" class="modal">
  <div class="modal-content">
    <h3>Withdraw</h3>
    <form id="withdrawForm">
      <input type="number" placeholder="Amount" required />
      <button type="submit">Withdraw</button>
    </form>
    <button onclick="closeModal('withdraw')">Close</button>
  </div>
</div>

<!-- YOUR JS -->
<script src="dashboard.js"></script>

</body>
</html>
